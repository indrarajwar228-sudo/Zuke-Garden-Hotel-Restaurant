<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZUKE GARDEN RESTAURANT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0d1117;color:white}
nav{position:fixed;top:0;width:100%;padding:18px 8%;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(14px);background:rgba(0,0,0,.25);z-index:999}
.logo{font-size:28px;font-weight:700;color:#22c55e}
nav ul{display:flex;gap:30px;list-style:none}
nav a{text-decoration:none;color:white}
.hero{height:100vh;background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.6)),url("https://images.unsplash.com/photo-1517248135467-4c7edcad34c4");background-size:cover;background-position:center;display:flex;justify-content:center;align-items:center;text-align:center;padding:20px}
.hero h1{font-size:62px}.hero p{margin-top:15px;font-size:18px;opacity:.9}
.btn{margin-top:30px;padding:14px 35px;border:none;border-radius:40px;background:#22c55e;color:white;font-size:17px}
.section{padding:90px 8%}.title{text-align:center;font-size:40px;margin-bottom:50px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:30px}
.card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(12px);border-radius:25px;overflow:hidden;transition:.4s}
.card:hover{transform:translateY(-10px)}
.card img{width:100%;height:230px;object-fit:cover}
.content{padding:25px}.price{margin-top:10px;color:#22c55e;font-size:24px;font-weight:bold}
.contact{background:linear-gradient(135deg,#111827,#0f172a);border-radius:30px;padding:50px;text-align:center}
.contact p{margin:15px 0}footer{padding:30px;text-align:center;color:#bbb}
@media(max-width:700px){.hero h1{font-size:38px}nav ul{display:none}}
</style>
</head>
<body>
<nav><div class="logo">ZUKE GARDEN</div><ul><li><a href="#">Home</a></li><li><a href="#">Menu</a></li><li><a href="#">Reservation</a></li><li><a href="#">Contact</a></li></ul></nav>
<section class="hero"><div><h1>Premium Taste<br>Inside The Garden</h1><p>Fresh Food • Beautiful Ambience • Fast Service</p><button class="btn">Reserve Table</button></div></section>
<section class="section"><h2 class="title">Popular Dishes</h2><div class="grid"></div></section>
<section class="section"><div class="contact"><h2 class="title">Reserve Your Table</h2><p>📍 Purulia, West Bengal</p><p>📞 +91 9876543210</p><p>📧 zukegarden@gmail.com</p></div></section>
<footer>© 2026 ZUKE GARDEN RESTAURANT</footer>
</body></html>
